<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d1f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Szabadulószoba — Játékmester</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Szabadulószoba <span class="dim">— Játékmester</span></h1>
    </header>

    <section id="setup" class="card">
      <h2>Új csapat</h2>
      <form id="team-form" autocomplete="off">
        <label>
          <span class="label-row">
            <span>Játékmester</span>
            <span class="label-actions">
              <button type="button" id="remove-gm-btn" class="ghost-btn" hidden>× Eltávolítás</button>
              <button type="button" id="add-gm-btn" class="ghost-btn">+ Új játékmester</button>
            </span>
          </span>
          <select name="gm" id="gm-select">
            <option value="">— nincs megadva —</option>
          </select>
        </label>

        <div id="add-gm-row" class="add-row" hidden>
          <input type="text" id="new-gm-input" placeholder="Új játékmester neve" maxlength="40"
                 autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" />
          <button type="button" id="confirm-add-gm" class="ghost-btn">Hozzáad</button>
          <button type="button" id="cancel-add-gm" class="ghost-btn">Mégsem</button>
        </div>

        <label>
          Szoba
          <select name="room" required>
            <option value="">Válassz szobát…</option>
            <option value="A Maja Birodalom">A Maja Birodalom</option>
            <option value="A Mélység Titka">A Mélység Titka</option>
            <option value="Alien vs Predator">Alien vs Predator</option>
            <option value="Azték">Azték</option>
            <option value="Bomb">Bomb</option>
            <option value="Éjszaka az Egyiptomi Múzeumban">Éjszaka az Egyiptomi Múzeumban</option>
            <option value="Japan">Japan</option>
            <option value="Madness">Madness</option>
            <option value="Prison">Prison</option>
            <option value="Roxfort és a Legendás Állatok">Roxfort és a Legendás Állatok</option>
            <option value="Tetthely">Tetthely</option>
            <option value="Zombie">Zombie</option>
          </select>
        </label>

        <label>
          Csapat neve
          <input type="text" name="teamName" required maxlength="60"
                 autocapitalize="words" autocorrect="off" spellcheck="false"
                 placeholder="pl. A Kódfejtők" />
        </label>

        <button type="submit" id="create-btn">Csapat létrehozása és QR megjelenítése</button>
      </form>
      <p class="error" id="err" hidden></p>
    </section>

    <section id="result" class="card" hidden>
      <h2 id="result-title"></h2>
      <p class="subtitle" id="result-sub"></p>

      <div id="qr" aria-label="Csapat csatlakozási QR-kód"></div>

      <p class="hint">A játékosok beolvassák a csatlakozáshoz. Mindenki ugyanabba a csapatba lép be.</p>

      <div class="url-row">
        <input type="text" id="auth-url" readonly />
        <button type="button" id="copy-btn">Másolás</button>
      </div>

      <button type="button" id="reset-btn">Új csapat indítása</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
